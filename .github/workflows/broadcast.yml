name: Offshore Pipeline - National Mesh

on:
  schedule:
    # Runs at the top of every hour automatically
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

permissions:
  contents: write # Needed to deploy to GitHub Pages (gh-pages branch)

jobs:
  build-and-broadcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up future runs by caching dependencies

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install chromium

      - name: Probe MahsaNet API (Discovery)
        run: python src/probe_api.py

      - name: Scrape MahsaNet Live Data
        run: python src/scrape_mahsa.py

      - name: Generate Base Map (Step 1)
        run: python src/build_base_map.py

      - name: Compile Offline HTML (Step 2)
        run: python src/compile_offline.py

      - name: Capture High-Res Snapshot (Step 3)
        run: python src/generate_snapshot.py

      - name: Broadcast to Telegram (Step 4)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/broadcast_telegram.py

      - name: Prepare Public Directory for Pages (Step 5)
        run: |
          mkdir public
          # We deploy the offline artifact as the root index.html
          cp mesh_map_offline.html public/index.html
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true # Keeps repo clean by overriding the gh-pages branch completely